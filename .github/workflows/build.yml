name: Build Instaladores

# Se ejecuta manualmente desde GitHub
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Compilar y publicar instalador .exe
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Subir .exe como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Instalador
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Compilar y publicar .dmg + .zip
        run: npx electron-builder --mac dmg zip --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Subir .dmg como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-dmg
          path: |
            dist/*.dmg
            dist/*.zip
