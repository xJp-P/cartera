    --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f5;--bg4:#d8dee4;

    --text:#1f2328;--text2:#656d76;--text3:#8c959f;
    --green:#1a7f37;--green2:#1a7f37;--green-bg:#dafbe1;--green-bd:#aceebb;
    --blue:#0969da;--blue-bg:#ddf4ff;--blue-bd:#b6e3ff;
    --red:#cf222e;--red-bg:#ffebe9;--red-bd:#ffcecb;
    --yellow:#9a6700;--yellow-bg:#fff8c5;
    --shadow:0 1px 6px rgba(0,0,0,.1);
  }
  .tooltip-wrap{position:relative}
  .tooltip-box{display:none;position:absolute;left:0;top:24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:11px;font-weight:400;color:var(--text2);width:260px;z-index:50;box-shadow:var(--shadow);line-height:1.5;white-space:normal}
  .tooltip-wrap:hover .tooltip-box{display:block}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  body{font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:stretch}
  #root{width:100%;max-width:520px;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
  input[type=number]{-moz-appearance:textfield}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
  .inp{width:100%;padding:9px 12px;font-size:13px;border:1.5px solid var(--border2);border-radius:10px;outline:none;font-family:inherit;color:var(--text);background:var(--bg3);transition:border-color .15s}
  .inp:focus{border-color:var(--green)}
  .inp option{background:var(--bg3);color:var(--text)}
  .btn-primary{width:100%;background:var(--green2);color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}

  .mono{font-family:'Cascadia Code','Consolas',monospace}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-sheet{animation:slideUp .25s cubic-bezier(.32,.72,0,1)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .fade-in{animation:fadeIn .2s ease}
  .pay-row:hover{background:var(--bg3)!important}
  .loan-card:hover{border-color:var(--green)!important}
  .debtor-card:hover{border-color:var(--blue)!important}
  .spinner{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}

  .hmenu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;backdrop-filter:blur(3px)}
  @keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}

  .hmenu-item:hover{background:var(--bg3);color:var(--text)}
  .hmenu-item.active{color:var(--green);background:var(--green-bg);font-weight:700}

  .gsearch-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;padding-top:60px}
  .gsearch-box{width:90%;max-width:460px;background:var(--bg2);border:1.5px solid var(--green);border-radius:14px;overflow:hidden}

  .quick-pay{padding:5px 10px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0}

  get:  function(url)   { return fetch(url).then(function(r){return r.json();}); },
  post: function(url,b) { return fetch(url,{method:'POST',  headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(function(r){return r.json();}); },
  put:  function(url,b) { return fetch(url,{method:'PUT',   headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(function(r){return r.json();}); },

function pmt(r,n,pv){ return r===0?pv/n:pv*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1); }
function fmt(n)  { return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0); }
function fmtUSD(n){ return 'USD $'+new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0); }
function fmtN(n) { return new Intl.NumberFormat('es-CO').format(Math.round(n||0)); }
// Convierte COP a USD usando TRM del préstamo; retorna string "USD $X.XX"
function copToUsd(cop,trm){ return trm>0?fmtUSD(cop/trm):''; }
function fmtD(s) { return s?new Date(s+'T12:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}):'-'; }

function generateRecibo(pay, loan, copRec, usdRec, allPays) {
  var esUSD = loan && loan.moneda === 'USD';
  var saldoRestante = pay.saldoFinal;
  var montoRecibido = copRec || pay.cuotaTotal;
  var fechaEmision = new Date().toLocaleDateString('es-CO', {day:'2-digit', month:'long', year:'numeric'});
  // Próximas cuotas (solo para Capital + Intereses y si hay pays disponibles)
  var proxCuotas = [];
  if (allPays && loan.modalidad === 'Capital + Intereses' && saldoRestante > 0) {
    proxCuotas = allPays.filter(function(p) {
      return p.prestamoId === loan.id && p.estadoPago === 'Pendiente' && p.id.indexOf('-ab-') === -1 && p.cuotaN > pay.cuotaN;
    }).sort(function(a, b) { return a.cuotaN - b.cuotaN; }).slice(0, 3);
  }
  var trm = loan.trmAcordada || 1;
  // Para USD: mostrar solo dolares; para COP: mostrar pesos
  var fv = esUSD ? function(cop) { return copToUsd(cop, trm); } : fmt;
  var html = [
    '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Recibo de Pago</title>',
    '<style>',
    '*{margin:0;padding:0;box-sizing:border-box}',

    '.header{text-align:center;border-bottom:2px solid #333;padding-bottom:14px;margin-bottom:18px}',
    '.header h1{font-size:20px;margin-bottom:4px}',
    '.header p{font-size:11px;color:#656d76}',
    '.section{margin-bottom:14px}',
    '.section-title{font-size:10px;font-weight:700;color:#656d76;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}',
    '.row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #eee}',
    '.row .label{color:#656d76}',
    '.row .value{font-weight:600;text-align:right}',
    '.total-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;text-align:center;margin:16px 0}',
    '.total-box .amount{font-size:24px;font-weight:700;color:#166534}',
    '.total-box .sub{font-size:12px;color:#166534;margin-top:2px}',
    '.footer{text-align:center;margin-top:20px;padding-top:14px;border-top:1px solid #ddd;font-size:10px;color:#8c959f}',
    '@media print{body{padding:20px}@page{margin:15mm}}',
    '</style></head><body>',
    '<div class="header">',
    '<h1>Recibo de Pago</h1>',
    '<p>Fecha de emision: ' + fechaEmision + '</p>',
    '</div>',
    '<div class="section">',
    '<div class="section-title">Deudor</div>',
    '<div class="row"><span class="label">Nombre</span><span class="value">' + pay.nombreCliente + '</span></div>',
    loan.cedula ? '<div class="row"><span class="label">Cedula / ID</span><span class="value">' + loan.cedula + '</span></div>' : '',
    loan.telefono ? '<div class="row"><span class="label">Telefono</span><span class="value">' + loan.telefono + '</span></div>' : '',
    '</div>',
    '<div class="section">',
    '<div class="section-title">Prestamo</div>',
    '<div class="row"><span class="label">Modalidad</span><span class="value">' + loan.modalidad + '</span></div>',
    '<div class="row"><span class="label">Monto original</span><span class="value">' + (esUSD ? fmtUSD(loan.montoOrigen) : fmt(loan.montoOrigen)) + '</span></div>',
    loan.tasaMensual > 0 ? '<div class="row"><span class="label">Tasa mensual</span><span class="value">' + loan.tasaMensual + '%</span></div>' : '',
    '</div>',
    '<div class="section">',
    '<div class="section-title">Detalle del pago</div>',
    '<div class="row"><span class="label">Cuota</span><span class="value">#' + pay.cuotaN + '</span></div>',
    '<div class="row"><span class="label">Fecha vencimiento</span><span class="value">' + fmtD(pay.fechaPago) + '</span></div>',
    '<div class="row"><span class="label">Fecha recaudo</span><span class="value">' + fmtD(pay.fechaRecaudo || new Date().toISOString().split('T')[0]) + '</span></div>',
    pay.interesPeriodo > 0 ? '<div class="row"><span class="label">Intereses</span><span class="value">' + fv(pay.interesPeriodo) + '</span></div>' : '',
    pay.abonoCapital > 0 ? '<div class="row"><span class="label">Abono a capital</span><span class="value">' + fv(pay.abonoCapital) + '</span></div>' : '',
    '<div class="row"><span class="label">Monto cuota</span><span class="value">' + fv(pay.cuotaTotal) + '</span></div>',
    '</div>',
    '<div class="total-box">',
    '<div style="font-size:10px;color:#656d76;margin-bottom:4px">MONTO RECIBIDO</div>',
    '<div class="amount">' + (esUSD && usdRec ? fmtUSD(usdRec) : fv(montoRecibido)) + '</div>',
    '</div>',
    '<div class="section">',
    '<div class="row"><span class="label">Saldo restante</span><span class="value">' + fv(saldoRestante) + '</span></div>',
    pay.observaciones ? '<div class="row"><span class="label">Observaciones</span><span class="value">' + pay.observaciones + '</span></div>' : '',
    '</div>',
    proxCuotas.length > 0 ? '<div class="section"><div class="section-title">Proximas cuotas</div>' + proxCuotas.map(function(pc) {
      return '<div class="row"><span class="label">Cuota #' + pc.cuotaN + ' - ' + fmtD(pc.fechaPago) + '</span><span class="value">' + fv(pc.cuotaTotal) + '</span></div>';
    }).join('') + '</div>' : '',
    '<div class="footer">',
    '<p>Este recibo es un comprobante de pago</p>',
    '<p style="margin-top:4px">Cartera de Prestamos</p>',
    '</div>',
    '</body></html>'
  ].join('\n');
  var w = window.open('', '_blank', 'width=550,height=700');
  w.document.write(html);
  w.document.close();
  w.onload = function() { w.print(); };
}
function fmtM(s) { return s?new Date(s+'-01T12:00:00').toLocaleDateString('es-CO',{month:'short',year:'2-digit'}):''; }

function Ico(props){
  var name=props.name,size=props.size||18,sw=props.sw||1.8,color=props.color||'currentColor';
  var d=ICONS[name]; if(!d) return null;
  var parts=d.split(' M ');
  var paths=parts.map(function(p,i){return i===0?p:'M '+p;});
  return h('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'},
    paths.map(function(p,i){return h('path',{key:i,d:p});}));
}

    var totalDeuda=active.reduce(function(s,l){

      return s+Math.max(0,Math.round(saldo));

// ── Rendimiento (Portfolio Performance) ───────────────────────────────────────
function PortfolioView(props){
  var loans=props.loans,pays=props.pays;
  var ft=useState('Activo'); var filtro=ft[0]; var setFiltro=ft[1];
  var loanMetrics=useMemo(function(){
    return loans.map(function(loan){
      var lp=pays.filter(function(p){return p.prestamoId===loan.id;});
      var paid=lp.filter(function(p){return p.estadoPago==='Pagado';});
      var esUSD=loan.moneda==='USD';
      // Identificar abonos reales (id contiene '-ab-')
      var esAbono=function(p){return p.id.indexOf('-ab-')!==-1;};
      // Regulares = cuotas normales del cronograma (no abonos)
      var regulares=lp.filter(function(p){return !esAbono(p);});
      var regularesPaid=paid.filter(function(p){return !esAbono(p);});
      var abonosPaid=paid.filter(function(p){return esAbono(p);});

      // ── GANANCIA: suma de intereses cobrados ──
      var ganancia;
      if(esUSD){
        // Para USD: si hay montoCOPRecibido, ganancia = copRecibido - porción capital COP
        ganancia=regularesPaid.reduce(function(s,p){
          if(p.montoCOPRecibido&&p.montoCOPRecibido>0){
            // Ganancia real = COP recibido - capital amortizado en esa cuota
            return s+(p.montoCOPRecibido-p.abonoCapital);
          }
          return s+p.interesPeriodo;
        },0);
      } else {
        ganancia=paid.reduce(function(s,p){return s+p.interesPeriodo;},0);
      }

      // ── CAPITAL RECUPERADO: abonos explícitos + capital amortizado en cuotas regulares pagadas ──
      var capitalAmortizado=regularesPaid.reduce(function(s,p){return s+p.abonoCapital;},0);
      var capitalAbonos=abonosPaid.reduce(function(s,p){return s+p.abonoCapital;},0);
      var capRec=capitalAmortizado+capitalAbonos;

      // ── SALDO PENDIENTE según modalidad ──
      // loan.montoCOP ya tiene descontados los abonos (el server lo actualiza)
      var saldo;
      if(loan.estado!=='Activo'){
        saldo=0;
      } else if(loan.modalidad==='Intereses'||loan.modalidad==='Prestamo'){
        // montoCOP ya refleja abonos - no restar de nuevo
        saldo=loan.montoCOP;
      } else {
        // Capital + Intereses: montoCOP ya tiene abonos descontados, restar amortización regular
        saldo=loan.montoCOP-capitalAmortizado;
      }
      saldo=Math.max(0,Math.round(saldo));

      // ── CUOTAS: solo regulares ──
      var cuotasPaid=regularesPaid.length;
      var cuotasTotal=regulares.length||1;

      // ── MORA: tiene cuotas en mora? ──
      var enMora=lp.some(function(p){return p.estadoPago==='En Mora';});

      return {loan:loan,ganancia:Math.round(ganancia),capRec:Math.round(capRec),saldo:saldo,
        cuotasPaid:cuotasPaid,cuotasTotal:cuotasTotal,enMora:enMora,capitalAbonos:Math.round(capitalAbonos)};
    }).sort(function(a,b){
      if(a.loan.estado!==b.loan.estado) return a.loan.estado==='Activo'?-1:1;
      return b.loan.fechaInicio.localeCompare(a.loan.fechaInicio);
    });
  },[loans,pays]);
  var totalGanancia=loanMetrics.reduce(function(s,m){return s+m.ganancia;},0);
  var totalColocado=loans.reduce(function(s,l){return s+(l.moneda==='USD'?l.montoCOP:l.montoOrigen);},0);
  var totalCapRec=loanMetrics.reduce(function(s,m){return s+m.capRec;},0);
  var totalSaldo=loanMetrics.reduce(function(s,m){return s+m.saldo;},0);

  function kpi(label,val,sub,color,bd){
    return h('div',{style:{background:'var(--bg2)',borderRadius:12,padding:'12px 14px',border:'1px solid '+bd}},
      h('div',{style:{fontSize:10,color:color,fontWeight:700,marginBottom:4}},label),

      h('div',{style:{fontSize:11,color:'var(--text3)',marginTop:3}},sub));
  }

  return h('div',{className:'fade-in',style:{padding:16}},
    h('div',{style:{fontWeight:700,fontSize:15,color:'var(--text)',marginBottom:2}},'\uD83D\uDCC8 Rendimiento del Portafolio'),
    h('div',{style:{fontSize:12,color:'var(--text2)',marginBottom:14}},'Ganancias realizadas y estado del capital'),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
      kpi('GANANCIA REALIZADA',fmt(totalGanancia),'Intereses cobrados','var(--green)','var(--green-bd)'),
      kpi('CAPITAL COLOCADO',fmt(totalColocado),'Total invertido','var(--blue)','var(--blue-bd)'),
      kpi('CAPITAL RECUPERADO',fmt(totalCapRec),'Capital + abonos','var(--blue)','var(--blue-bd)'),
      kpi('SALDO PENDIENTE',fmt(totalSaldo),'Capital expuesto','var(--yellow)','var(--border)')),
    h('div',{style:{display:'flex',gap:0,marginBottom:12,background:'var(--bg2)',borderRadius:10,border:'1px solid var(--border)',overflow:'hidden'}},
      [['Activo','Activo'],['Cancelado','Finalizado']].map(function(t){
        var val=t[0],label=t[1];
        var active=filtro===val;
        var cnt=loanMetrics.filter(function(m){return m.loan.estado===val;}).length;
        return h('button',{key:val,onClick:function(){setFiltro(val);},style:{flex:1,padding:'9px 0',fontSize:12,fontWeight:700,cursor:'pointer',border:'none',
          background:active?'var(--green)':'transparent',color:active?'#fff':'var(--text3)',transition:'all .15s'}},
          label+' ('+cnt+')');
      })),
    loanMetrics.filter(function(m){return m.loan.estado===filtro;}).length===0&&h('div',{style:{textAlign:'center',padding:'40px 0',color:'var(--text3)'}},
      h('div',{style:{fontSize:40,marginBottom:10}},filtro==='Activo'?'\uD83D\uDCB0':'\u2705'),

    h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      loanMetrics.filter(function(m){return m.loan.estado===filtro;}).map(function(m){
        var l=m.loan;
        var esUSD=l.moneda==='USD';
        var pct=m.cuotasTotal>0?Math.round(m.cuotasPaid/m.cuotasTotal*100):0;
        var stColor=l.estado==='Activo'?'var(--green)':'var(--text3)';
        var stBg=l.estado==='Activo'?'var(--green-bg)':'var(--bg3)';
        // Color del saldo: naranja si hay mora, amarillo si activo, gris si cancelado

        return h('div',{key:l.id,style:{background:'var(--bg2)',borderRadius:14,padding:'13px 14px',border:'1px solid '+(m.enMora&&l.estado==='Activo'?'var(--red-bd)':'var(--border)')}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},

function CalcView(props){
  var onConfirm=props.onConfirm;
  var s1=useState(''); var monto=s1[0]; var setMonto=s1[1];
  var s2=useState('Intereses'); var modalidad=s2[0]; var setModalidad=s2[1];
  var s3=useState(''); var tasa=s3[0]; var setTasa=s3[1];
  var s4=useState(''); var plazo=s4[0]; var setPlazo=s4[1];
  var s5=useState(false); var showCrono=s5[0]; var setShowCrono=s5[1];
  var s6=useState('COP'); var moneda=s6[0]; var setMoneda=s6[1];
  var s7=useState(''); var trmCalc=s7[0]; var setTrmCalc=s7[1];
